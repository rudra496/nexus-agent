src:
  - changed-files:
      - any-glob-to-any-file: "src/**"

tests:
  - changed-files:
      - any-glob-to-any-file: "tests/**"

docker:
  - changed-files:
      - any-glob-to-any-file:
          - "Dockerfile"
          - "docker-compose.yml"

documentation:
  - changed-files:
      - any-glob-to-any-file:
          - "**/*.md"
          - "docs/**"

ci:
  - changed-files:
      - any-glob-to-any-file: ".github/workflows/**"

config:
  - changed-files:
      - any-glob-to-any-file:
          - "pyproject.toml"
          - "setup.py"
          - "requirements.txt"
          - ".env*"
